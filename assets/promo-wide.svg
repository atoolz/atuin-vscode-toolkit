<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#120a20"/>
      <stop offset="100%" stop-color="#1a1030"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="accentOrb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentOrb2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#9333ea" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#94a3b8"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Decorative gradient orbs -->
  <circle cx="200" cy="300" r="250" fill="url(#accentOrb)"/>
  <circle cx="1000" cy="500" r="300" fill="url(#accentOrb2)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="#a855f7" opacity="0.6"/>

  <!-- Icon -->
  <g transform="translate(80, 180)">
    <rect width="100" height="100" rx="20" fill="url(#iconGrad)"/>
    <rect x="1" y="1" width="98" height="98" rx="19" fill="none" stroke="#c084fc" stroke-width="1.5" opacity="0.3"/>
    <text x="50" y="50" text-anchor="middle" dominant-baseline="central" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="-1.5">At</text>
  </g>

  <!-- Title -->
  <text x="210" y="215" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="800" fill="#ffffff" letter-spacing="-1">Atuin Toolkit</text>

  <!-- Subtitle -->
  <text x="210" y="258" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#94a3b8">for VS Code</text>

  <!-- Divider line -->
  <rect x="80" y="310" width="500" height="1" fill="#334155" opacity="0.8"/>

  <!-- Feature list -->
  <g font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="19" fill="#e2e8f0">
    <circle cx="100" cy="352" r="4" fill="#a855f7"/>
    <text x="120" y="358">13 config sections</text>

    <circle cx="100" cy="392" r="4" fill="#a855f7"/>
    <text x="120" y="398">90+ options with types</text>

    <circle cx="100" cy="432" r="4" fill="#a855f7"/>
    <text x="120" y="438">Enum validation</text>

    <circle cx="100" cy="472" r="4" fill="#a855f7"/>
    <text x="120" y="478">Real-time diagnostics</text>

    <circle cx="100" cy="512" r="4" fill="#a855f7"/>
    <text x="120" y="518">6 ready-to-use snippets</text>
  </g>

  <!-- Right side decorative code block -->
  <g transform="translate(660, 140)" opacity="0.9">
    <rect width="460" height="340" rx="12" fill="#120a20" stroke="#334155" stroke-width="1"/>
    <!-- Window dots -->
    <circle cx="24" cy="20" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="44" cy="20" r="5" fill="#eab308" opacity="0.7"/>
    <circle cx="64" cy="20" r="5" fill="#22c55e" opacity="0.7"/>
    <!-- Code lines -->
    <g font-family="'Fira Code', 'Cascadia Code', 'Consolas', monospace" font-size="15">
      <text x="24" y="55" fill="#c084fc">search_mode</text><text x="130" y="55" fill="#64748b"> = </text><text x="156" y="55" fill="#86efac">"fuzzy"</text>
      <text x="24" y="80" fill="#c084fc">filter_mode</text><text x="126" y="80" fill="#64748b"> = </text><text x="152" y="80" fill="#86efac">"host"</text>
      <text x="24" y="105" fill="#c084fc">style</text><text x="66" y="105" fill="#64748b"> = </text><text x="92" y="105" fill="#86efac">"compact"</text>
      <text x="24" y="130" fill="#c084fc">inline_height</text><text x="148" y="130" fill="#64748b"> = </text><text x="174" y="130" fill="#fbbf24">40</text>
      <text x="24" y="155" fill="#c084fc">enter_accept</text><text x="140" y="155" fill="#64748b"> = </text><text x="166" y="155" fill="#f9a8d4">true</text>
      <text x="24" y="190" fill="#64748b">[</text><text x="33" y="190" fill="#7dd3fc">daemon</text><text x="88" y="190" fill="#64748b">]</text>
      <text x="24" y="215" fill="#c084fc">enabled</text><text x="92" y="215" fill="#64748b"> = </text><text x="118" y="215" fill="#f9a8d4">true</text>
      <text x="24" y="240" fill="#c084fc">sync_frequency</text><text x="156" y="240" fill="#64748b"> = </text><text x="182" y="240" fill="#fbbf24">300</text>
    </g>
    <!-- Autocomplete popup -->
    <g transform="translate(180, 35)">
      <rect width="240" height="155" rx="6" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
      <rect x="4" y="6" width="232" height="26" rx="4" fill="#a855f7" opacity="0.2"/>
      <g font-family="'Fira Code', 'Cascadia Code', 'Consolas', monospace" font-size="13" fill="#e2e8f0">
        <text x="12" y="24" fill="#ffffff" font-weight="600">fuzzy</text><text x="60" y="24" fill="#64748b" font-size="11">fuzzy matching</text>
        <text x="12" y="50">prefix</text><text x="68" y="50" fill="#64748b" font-size="11">prefix search</text>
        <text x="12" y="76">fulltext</text><text x="78" y="76" fill="#64748b" font-size="11">full text search</text>
        <text x="12" y="102">skim</text><text x="52" y="102" fill="#64748b" font-size="11">skim algorithm</text>
        <text x="12" y="128">daemon-fuzzy</text><text x="120" y="128" fill="#64748b" font-size="11">daemon mode</text>
      </g>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#120a20" opacity="0.7"/>
  <text x="600" y="610" text-anchor="middle" font-family="'Fira Code', 'Cascadia Code', 'Consolas', monospace" font-size="15" fill="#64748b">github.com/atoolz/atuin-vscode-toolkit</text>

  <!-- VS Code badge -->
  <g transform="translate(1020, 590)">
    <rect x="0" y="-12" width="120" height="28" rx="14" fill="#a855f7" opacity="0.15"/>
    <text x="60" y="6" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" fill="#c084fc">VS Code</text>
  </g>
</svg>