<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <clipPath id="editorClip">
      <rect x="40" y="20" width="720" height="310" rx="8"/>
    </clipPath>
  </defs>

  <!-- Page background -->
  <rect width="800" height="350" fill="#0d0d0d"/>

  <g clip-path="url(#editorClip)" filter="url(#shadow)">
    <!-- Editor window -->
    <rect x="40" y="20" width="720" height="310" rx="8" fill="#1e1e1e" stroke="#333" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="40" y="20" width="720" height="32" rx="8" fill="#323233"/>
    <rect x="40" y="44" width="720" height="8" fill="#323233"/>
    <circle cx="62" cy="36" r="6" fill="#ff5f57"/>
    <circle cx="82" cy="36" r="6" fill="#febc2e"/>
    <circle cx="102" cy="36" r="6" fill="#28c840"/>
    <rect x="130" y="22" width="140" height="28" fill="#1e1e1e" rx="4"/>
    <text x="142" y="40" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="12" fill="#cccccc">config.toml</text>

    <!-- Line numbers gutter -->
    <rect x="40" y="52" width="40" height="248" fill="#1e1e1e"/>

    <!-- Code content -->
    <g font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="13">
      <!-- Line 1 -->
      <text x="56" y="80" fill="#555">1</text>
      <text x="88" y="80" fill="#6a9955"># Atuin configuration</text>

      <!-- Line 2: valid -->
      <text x="56" y="104" fill="#555">2</text>
      <text x="88" y="104" fill="#9cdcfe">auto_sync</text>
      <text x="160" y="104" fill="#d4d4d4"> = </text>
      <text x="180" y="104" fill="#569cd6">true</text>

      <!-- Line 3: invalid enum value - red squiggly -->
      <text x="56" y="128" fill="#555">3</text>
      <text x="88" y="128" fill="#9cdcfe">search_mode</text>
      <text x="180" y="128" fill="#d4d4d4"> = </text>
      <text x="200" y="128" fill="#ce9178">"regex"</text>
      <!-- Red squiggly underline -->
      <path d="M200,132 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3" fill="none" stroke="#f44747" stroke-width="1"/>

      <!-- Line 4: valid -->
      <text x="56" y="152" fill="#555">4</text>
      <text x="88" y="152" fill="#9cdcfe">filter_mode</text>
      <text x="172" y="152" fill="#d4d4d4"> = </text>
      <text x="192" y="152" fill="#ce9178">"global"</text>

      <!-- Line 5 -->
      <text x="56" y="176" fill="#555">5</text>

      <!-- Line 6 -->
      <text x="56" y="200" fill="#555">6</text>
      <text x="88" y="200" fill="#dcdcaa">[daemon]</text>

      <!-- Line 7: unknown option - red squiggly -->
      <text x="56" y="224" fill="#555">7</text>
      <text x="88" y="224" fill="#9cdcfe">max_threads</text>
      <text x="180" y="224" fill="#d4d4d4"> = </text>
      <text x="200" y="224" fill="#b5cea8">4</text>
      <!-- Red squiggly underline -->
      <path d="M88,228 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3" fill="none" stroke="#f44747" stroke-width="1"/>

      <!-- Line 8: valid -->
      <text x="56" y="248" fill="#555">8</text>
      <text x="88" y="248" fill="#9cdcfe">enabled</text>
      <text x="144" y="248" fill="#d4d4d4"> = </text>
      <text x="164" y="248" fill="#569cd6">true</text>
    </g>

    <!-- Problems panel -->
    <rect x="40" y="264" width="720" height="66" fill="#1e1e1e"/>
    <rect x="40" y="264" width="720" height="1" fill="#454545"/>

    <!-- Panel tab bar -->
    <rect x="40" y="264" width="720" height="22" fill="#252526"/>
    <text x="56" y="280" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#cccccc" font-weight="600">PROBLEMS</text>
    <text x="130" y="280" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#f44747">2</text>

    <!-- Problem entries -->
    <g font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="11">
      <!-- Error icon + message 1 -->
      <circle cx="60" cy="298" r="5" fill="#f44747"/>
      <text x="56" y="301" fill="#fff" font-size="8" text-anchor="middle" font-weight="700">!</text>
      <text x="72" y="302" fill="#cccccc">Invalid value "regex" for search_mode. Expected: fuzzy, prefix, fulltext, skim, daemon-fuzzy</text>

      <!-- Error icon + message 2 -->
      <circle cx="60" cy="318" r="5" fill="#f44747"/>
      <text x="56" y="321" fill="#fff" font-size="8" text-anchor="middle" font-weight="700">!</text>
      <text x="72" y="322" fill="#cccccc">Unknown option "max_threads" in section [daemon]</text>
    </g>
  </g>
</svg>
