<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="editorClip">
      <rect x="40" y="30" width="720" height="440" rx="8"/>
    </clipPath>
  </defs>

  <!-- Page background -->
  <rect width="800" height="500" fill="#0d0d0d"/>

  <g clip-path="url(#editorClip)" filter="url(#shadow)">
    <!-- Editor window -->
    <rect x="40" y="30" width="720" height="440" rx="8" fill="#1e1e1e" stroke="#333" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="40" y="30" width="720" height="32" rx="8" fill="#323233"/>
    <rect x="40" y="54" width="720" height="8" fill="#323233"/>
    <circle cx="62" cy="46" r="6" fill="#ff5f57"/>
    <circle cx="82" cy="46" r="6" fill="#febc2e"/>
    <circle cx="102" cy="46" r="6" fill="#28c840"/>
    <rect x="130" y="32" width="140" height="28" fill="#1e1e1e" rx="4"/>
    <text x="142" y="50" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="12" fill="#cccccc">config.toml</text>

    <!-- Breadcrumb bar -->
    <rect x="40" y="62" width="720" height="24" fill="#252526"/>
    <text x="56" y="78" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="11" fill="#888">config.toml > [daemon]</text>

    <!-- Line numbers gutter -->
    <rect x="40" y="86" width="40" height="384" fill="#1e1e1e"/>

    <!-- Code content -->
    <g font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="13">
      <!-- Line 1 -->
      <text x="56" y="112" fill="#555">1</text>
      <text x="88" y="112" fill="#6a9955"># Atuin configuration</text>

      <!-- Line 2 -->
      <text x="56" y="136" fill="#555">2</text>
      <text x="88" y="136" fill="#9cdcfe">search_mode</text>
      <text x="176" y="136" fill="#d4d4d4"> = </text>
      <text x="196" y="136" fill="#ce9178">"fuzzy"</text>

      <!-- Line 3 -->
      <text x="56" y="160" fill="#555">3</text>
      <text x="88" y="160" fill="#9cdcfe">filter_mode</text>
      <text x="172" y="160" fill="#d4d4d4"> = </text>
      <text x="192" y="160" fill="#ce9178">"global"</text>

      <!-- Line 4 -->
      <text x="56" y="184" fill="#555">4</text>

      <!-- Line 5 -->
      <text x="56" y="208" fill="#555">5</text>
      <text x="88" y="208" fill="#dcdcaa">[daemon]</text>

      <!-- Line 6 -->
      <text x="56" y="232" fill="#555">6</text>
      <text x="88" y="232" fill="#9cdcfe">enabled</text>
      <text x="144" y="232" fill="#d4d4d4"> = </text>
      <text x="164" y="232" fill="#569cd6">true</text>

      <!-- Line 7 -->
      <text x="56" y="256" fill="#555">7</text>
      <text x="88" y="256" fill="#9cdcfe">autostart</text>
      <text x="160" y="256" fill="#d4d4d4"> = </text>
      <text x="180" y="256" fill="#569cd6">true</text>

      <!-- Line 8: cursor typing -->
      <text x="56" y="280" fill="#555">8</text>
      <text x="88" y="280" fill="#9cdcfe">s</text>
      <!-- Cursor -->
      <rect x="96" y="268" width="2" height="16" fill="#a855f7">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>

      <!-- Line 9 -->
      <text x="56" y="304" fill="#555">9</text>
    </g>

    <!-- Completion dropdown -->
    <g filter="url(#glow)">
      <rect x="86" y="288" width="380" height="168" rx="4" fill="#252526" stroke="#454545" stroke-width="1"/>

      <g font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="12">
        <!-- Selected item -->
        <rect x="88" y="290" width="376" height="24" fill="#094771" rx="2"/>
        <text x="104" y="306" fill="#a855f7">&#9632;</text>
        <text x="120" y="306" fill="#ffffff">sync_frequency</text>
        <text x="310" y="306" fill="#666" font-size="10">number, default: 300</text>

        <text x="104" y="330" fill="#c084fc">&#9632;</text>
        <text x="120" y="330" fill="#cccccc">socket_path</text>
        <text x="310" y="330" fill="#666" font-size="10">string</text>

        <text x="104" y="354" fill="#c084fc">&#9632;</text>
        <text x="120" y="354" fill="#cccccc">systemd_socket</text>
        <text x="310" y="354" fill="#666" font-size="10">boolean, default: false</text>

        <!-- Scrollbar hint -->
        <rect x="88" y="362" width="376" height="1" fill="#333" opacity="0.5"/>

        <text x="104" y="378" fill="#c084fc">&#9632;</text>
        <text x="120" y="378" fill="#cccccc">pidfile_path</text>
        <text x="310" y="378" fill="#666" font-size="10">string</text>

        <text x="104" y="402" fill="#c084fc">&#9632;</text>
        <text x="120" y="402" fill="#cccccc">tcp_port</text>
        <text x="310" y="402" fill="#666" font-size="10">number, default: 8889</text>
      </g>

      <!-- Detail panel on right -->
      <rect x="468" y="288" width="260" height="90" rx="4" fill="#2d2d2d" stroke="#454545" stroke-width="1"/>
      <g font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="11">
        <text x="480" y="308" fill="#a855f7" font-weight="600" font-size="12">sync_frequency</text>
        <text x="480" y="326" fill="#999">How often the daemon syncs</text>
        <text x="480" y="342" fill="#999">in seconds.</text>
        <text x="480" y="362" fill="#666">Type: </text><text x="516" y="362" fill="#c084fc">number</text>
        <text x="480" y="378" fill="#666">Default: </text><text x="534" y="378" fill="#b5cea8">300</text>
      </g>
    </g>
  </g>

  <!-- Status bar -->
  <rect x="40" y="446" width="720" height="24" fill="#a855f7" rx="0"/>
  <text x="56" y="462" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="11" fill="#ffffff">Atuin Toolkit</text>
  <text x="680" y="462" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="11" fill="#ffffff">TOML</text>
</svg>
