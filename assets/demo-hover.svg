<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <clipPath id="editorClip">
      <rect x="40" y="20" width="720" height="310" rx="8"/>
    </clipPath>
  </defs>

  <!-- Page background -->
  <rect width="800" height="350" fill="#0d0d0d"/>

  <g clip-path="url(#editorClip)" filter="url(#shadow)">
    <!-- Editor window -->
    <rect x="40" y="20" width="720" height="310" rx="8" fill="#1e1e1e" stroke="#333" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="40" y="20" width="720" height="32" rx="8" fill="#323233"/>
    <rect x="40" y="44" width="720" height="8" fill="#323233"/>
    <circle cx="62" cy="36" r="6" fill="#ff5f57"/>
    <circle cx="82" cy="36" r="6" fill="#febc2e"/>
    <circle cx="102" cy="36" r="6" fill="#28c840"/>
    <rect x="130" y="22" width="140" height="28" fill="#1e1e1e" rx="4"/>
    <text x="142" y="40" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="12" fill="#cccccc">config.toml</text>

    <!-- Line numbers gutter -->
    <rect x="40" y="52" width="40" height="278" fill="#1e1e1e"/>

    <!-- Code content -->
    <g font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="13">
      <!-- Line 1 -->
      <text x="56" y="80" fill="#555">1</text>
      <text x="88" y="80" fill="#6a9955"># Atuin configuration</text>

      <!-- Line 2 -->
      <text x="56" y="104" fill="#555">2</text>
      <text x="88" y="104" fill="#9cdcfe">auto_sync</text>
      <text x="160" y="104" fill="#d4d4d4"> = </text>
      <text x="180" y="104" fill="#569cd6">true</text>

      <!-- Line 3: hovered option -->
      <text x="56" y="128" fill="#555">3</text>
      <!-- Highlight background for hovered word -->
      <rect x="86" y="116" width="92" height="18" fill="#264f78" rx="2" opacity="0.5"/>
      <text x="88" y="128" fill="#9cdcfe">search_mode</text>
      <text x="180" y="128" fill="#d4d4d4"> = </text>
      <text x="200" y="128" fill="#ce9178">"fuzzy"</text>

      <!-- Line 4 -->
      <text x="56" y="152" fill="#555">4</text>
      <text x="88" y="152" fill="#9cdcfe">filter_mode</text>
      <text x="172" y="152" fill="#d4d4d4"> = </text>
      <text x="192" y="152" fill="#ce9178">"global"</text>

      <!-- Line 5 -->
      <text x="56" y="176" fill="#555">5</text>
      <text x="88" y="176" fill="#9cdcfe">style</text>
      <text x="128" y="176" fill="#d4d4d4"> = </text>
      <text x="148" y="176" fill="#ce9178">"compact"</text>
    </g>

    <!-- Hover tooltip -->
    <g>
      <rect x="86" y="134" width="380" height="160" rx="6" fill="#2d2d2d" stroke="#454545" stroke-width="1"/>

      <!-- Tooltip content -->
      <g font-family="'Inter', 'Helvetica Neue', Arial, sans-serif">
        <!-- Title -->
        <text x="102" y="158" fill="#a855f7" font-size="14" font-weight="700">search_mode</text>
        <text x="210" y="158" fill="#666" font-size="11">(top-level)</text>

        <!-- Divider -->
        <rect x="102" y="166" width="348" height="1" fill="#444"/>

        <!-- Description -->
        <text x="102" y="186" fill="#cccccc" font-size="12">Search algorithm to use.</text>

        <!-- Type -->
        <text x="102" y="210" fill="#888" font-size="12">Type:</text>
        <text x="142" y="210" fill="#c084fc" font-size="12" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace">string</text>

        <!-- Default -->
        <text x="200" y="210" fill="#888" font-size="12">Default:</text>
        <text x="256" y="210" fill="#b5cea8" font-size="12" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace">"fuzzy"</text>

        <!-- Enum values -->
        <text x="102" y="234" fill="#888" font-size="12">Values:</text>
        <rect x="152" y="222" width="52" height="18" rx="3" fill="#3c2a5c"/>
        <text x="160" y="235" fill="#c084fc" font-size="11" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace">fuzzy</text>
        <rect x="210" y="222" width="56" height="18" rx="3" fill="#3c2a5c"/>
        <text x="218" y="235" fill="#c084fc" font-size="11" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace">prefix</text>
        <rect x="272" y="222" width="68" height="18" rx="3" fill="#3c2a5c"/>
        <text x="280" y="235" fill="#c084fc" font-size="11" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace">fulltext</text>
        <rect x="346" y="222" width="42" height="18" rx="3" fill="#3c2a5c"/>
        <text x="354" y="235" fill="#c084fc" font-size="11" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace">skim</text>

        <rect x="152" y="244" width="104" height="18" rx="3" fill="#3c2a5c"/>
        <text x="160" y="257" fill="#c084fc" font-size="11" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace">daemon-fuzzy</text>

        <!-- Doc link -->
        <text x="102" y="282" fill="#569cd6" font-size="11" text-decoration="underline">docs.atuin.sh/cli/configuration/config/</text>
      </g>
    </g>
  </g>
</svg>
